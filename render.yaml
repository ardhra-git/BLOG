# render.yaml — drop this in the root of your repo (blog/)
# Render will auto-detect it and configure everything.

services:
  - type: web
    name: blog
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString

databases:
  - name: blog-db
    plan: free
